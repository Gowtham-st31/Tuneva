name: Build Tuneva EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --name local_server local_server.py
      - name: Create downloads dir
        run: |
          mkdir -p static\downloads || exit 0
          copy /y dist\local_server.exe static\downloads\Tuneva.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tuneva-exe
          path: static\downloads\Tuneva.exe
