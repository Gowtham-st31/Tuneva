<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tuneva</title>
	<link rel="icon" type="image/png" href="{{ url_for('static', filename='tab-logo.png') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
	<div class="ambient-waves" aria-hidden="true">
		<span class="wave wave-a"></span>
		<span class="wave wave-b"></span>
		<span class="wave wave-c"></span>
	</div>

	<main class="auth-shell">
		<section class="auth-card" aria-label="Create your Tuneva account">
			<div class="auth-brand">
				<p class="brand-kicker">Premium Streaming</p>
				<h1>Create Account</h1>
				<p class="brand-sub">Join Tuneva and build your daily soundtrack.</p>
			</div>

			{% if error %}
			<p class="auth-alert auth-alert-error">{{ error }}</p>
			{% endif %}

			{% if message %}
			<p class="auth-alert auth-alert-success">{{ message }}</p>
			{% endif %}

			<form method="POST" class="auth-form" autocomplete="on">
				<div class="field floating-field">
					<input id="email" name="email" type="email" required placeholder=" ">
					<label for="email">Gmail Address</label>
				</div>

				<div class="field floating-field">
					<input id="password" name="password" type="password" required placeholder=" ">
					<label for="password">Password</label>
				</div>

				<button class="primary-btn" type="submit">Create Account</button>
			</form>

			<p class="auth-footnote">
				Already have an account?
				<a href="/">Log in</a>
			</p>
		</section>
	</main>
</body>
</html>
