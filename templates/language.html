<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tuneva</title>
	<link rel="icon" type="image/png" href="{{ url_for('static', filename='tab-logo.png') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
	<h2>Select Languages</h2>

	<form method="POST">
		<div class="language-options">
			{% for lang in (available_languages or []) %}
			<label class="language-option">
				<input type="checkbox" name="language" value="{{ lang }}" {% if lang in (selected_languages or []) %}checked{% endif %}>
				<span>{{ lang|title }}</span>
			</label>
			{% endfor %}
		</div>

		<button type="submit">Continue</button>
	</form>
</body>
</html>
