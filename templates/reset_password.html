<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuneva</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='tab-logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
    <div class="ambient-waves" aria-hidden="true">
        <span class="wave wave-a"></span>
        <span class="wave wave-b"></span>
        <span class="wave wave-c"></span>
    </div>

    <main class="auth-shell">
        <section class="auth-card" aria-label="Reset password with OTP">
            <div class="auth-brand">
                <p class="brand-kicker">Password Recovery</p>
                <h1>Reset Password</h1>
                <p class="brand-sub">Enter the OTP sent to {{ email }} and create a new password.</p>
            </div>

            {% if error %}
            <p class="auth-alert auth-alert-error">{{ error }}</p>
            {% endif %}

            {% if message %}
            <p class="auth-alert auth-alert-success">{{ message }}</p>
            {% endif %}

            <form method="POST" class="auth-form" autocomplete="off">
                <input type="hidden" name="email" value="{{ email }}">

                <div class="field floating-field">
                    <input id="otp" name="otp" type="text" maxlength="6" required placeholder=" ">
                    <label for="otp">Enter 6-digit OTP</label>
                </div>

                <div class="field floating-field">
                    <input id="new_password" name="new_password" type="password" required placeholder=" ">
                    <label for="new_password">New Password</label>
                </div>

                <div class="field floating-field">
                    <input id="confirm_password" name="confirm_password" type="password" required placeholder=" ">
                    <label for="confirm_password">Confirm Password</label>
                </div>

                <button class="primary-btn" type="submit" name="action" value="reset">Reset Password</button>
                <button class="secondary-btn" type="submit" name="action" value="resend">Resend OTP</button>
            </form>

            <p class="auth-footnote">
                <a href="/">Back to login</a>
            </p>
        </section>
    </main>
</body>
</html>
